name: AI新闻每日推送系统

on:
  schedule:
    - cron: '0 1 * * *'   # 每天中国早上9点
  workflow_dispatch:

jobs:
  send-ai-news:
    runs-on: ubuntu-latest

    steps:
      - name: 获取AI新闻
        id: news
        run: |
          NEWS=$(curl -s https://hnrss.org/newest?q=AI | head -n 40)
          echo "news<<EOF" >> $GITHUB_OUTPUT
          echo "$NEWS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 发送邮件
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: 你的邮箱@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: 每日AI新闻
          to: 你的邮箱@gmail.com
          from: 你的邮箱@gmail.com
          body: |
            今日AI新闻：

            ${{ steps.news.outputs.news }}
